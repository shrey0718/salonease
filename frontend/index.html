<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- MOBILE VIEWPORT FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>SalonEase</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Cursive font for "SalonEase" -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- Elegant + clean fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- BACKGROUND IMAGE STYLE -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        overflow-x: hidden; /* prevents sideways scroll on mobile */
        background-image: url("/bg-salonease.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      /* Improve text readability on small screens */
      @media (max-width: 768px) {
        h1 span {
          font-size: 42px !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- Mediapipe (Virtual Try On) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
