<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>SalonEase</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Cursive font -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- Elegant fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- GLOBAL MOBILE SAFE STYLES -->
    <style>

      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        width: 100%;
        background-image: url("/bg-salonease.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      /* Prevent elements from exceeding screen */
      img, video, canvas {
        max-width: 100%;
        height: auto;
      }

      /* Make charts responsive */
      .recharts-wrapper {
        width: 100% !important;
      }

      /* Improve text scaling on small screens */
      @media (max-width: 768px) {

        body {
          font-size: 14px;
        }

        h1 span {
          font-size: 40px !important;
        }

        .container,
        .row {
          margin-left: 0 !important;
          margin-right: 0 !important;
        }

      }

    </style>

  </head>

  <body>

    <div id="root"></div>

    <!-- Mediapipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- React -->
    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
